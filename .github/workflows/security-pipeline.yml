name: SecureFlow Security Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:

  security-scan:
    name: Pre-Build Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

  build-and-scan:
    name: Build, Push, and CVE Scan
    runs-on: ubuntu-latest
    needs: security-scan
    outputs:
      gate_action: ${{ steps.gate.outputs.action }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Backend Image
        run: |
          docker build -t us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/backend:${{ github.sha }} \
            -f docker/Dockerfile .

      - name: Push Backend Image
        run: |
          docker push us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/backend:${{ github.sha }}

      - name: Run Trivy Scan on the Real Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/backend:${{ github.sha }}
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH,MEDIUM,LOW

      - name: Upload Scan Results (for audit trail)
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json

      - name: Send Trivy Results to Backend and Capture Decision
        id: gate
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          echo "Findings vuln count: $(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy-results.json)"

          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg sha "$COMMIT_SHA" \
            --arg branch "$BRANCH_NAME" \
            --arg scan_type "trivy" \
            --arg commit_msg "$COMMIT_MESSAGE" \
            --slurpfile findings trivy-results.json \
            '{repo_name: $repo, commit_sha: $sha, branch: $branch, scan_type: $scan_type, commit_message: $commit_msg, findings: $findings[0]}')

          RESPONSE=$(echo "$PAYLOAD" | curl -sS -f -X POST "$BACKEND_URL/api/scan-results" \
            -H "Content-Type: application/json" \
            -d @-)

          echo "Backend response: $RESPONSE"

          ACTION=$(echo "$RESPONSE" | jq -r '.action')
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

          if [ "$ACTION" = "BLOCK" ]; then
            echo "Policy gate says BLOCK - stopping pipeline before deploy."
            exit 1
          fi

  deploy:
    name: Deploy Scanned Image to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: needs.build-and-scan.outputs.gate_action == 'ALLOW'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Deploy Backend (the image we already scanned)
        run: |
          gcloud run deploy secureflow-backend \
            --image us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/backend:${{ github.sha }} \
            --region us-central1 \
            --allow-unauthenticated

      - name: Build and Push Frontend Image
        run: |
          docker build -t us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/frontend:${{ github.sha }} \
            --build-arg REACT_APP_API_URL=https://secureflow-backend-1083585992526.us-central1.run.app \
            -f frontend/Dockerfile frontend/
          docker push us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/frontend:${{ github.sha }}

      - name: Deploy Frontend
        run: |
          gcloud run deploy secureflow-frontend \
            --image us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/frontend:${{ github.sha }} \
            --region us-central1 \
            --allow-unauthenticated \
            --port 8080