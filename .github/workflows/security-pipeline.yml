name: SecureFlow Security Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  security-pipeline:
    name: Full Security Check
    runs-on: ubuntu-latest

    steps:

      # ── Step 0: Checkout ────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 fetches the full git history, not just the latest commit.
          # This is required for Gitleaks to scan all commits, not just HEAD —
          # without it, secrets committed earlier and then "deleted" would go undetected
          fetch-depth: 0

      # ── Step 1: Notify dashboard — pipeline started ─────────────────────────
      # Creates a "running" DB record immediately so the dashboard shows
      # the pipeline in progress before any scan results arrive.
      # The run_id returned here is passed to every subsequent step so they
      # all update the same record instead of creating duplicates.
      - name: Notify Pipeline Start
        id: pipeline_start
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg sha "$COMMIT_SHA" \
            --arg branch "$BRANCH_NAME" \
            --arg commit_msg "$COMMIT_MESSAGE" \
            --arg scan_type "full-pipeline" \
            '{ repo_name: $repo, commit_sha: $sha, branch: $branch, commit_message: $commit_msg, scan_type: $scan_type }')

          RESPONSE=$(curl -sS -f -X POST "$BACKEND_URL/api/scan-results/start" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo '{"run_id":null}')

          echo "Backend response: $RESPONSE"
          RUN_ID=$(echo "$RESPONSE" | jq -r '.run_id // empty')
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      # ── Step 2: Install Gitleaks ────────────────────────────────────────────
      # Pin to a specific version (v8.24.3) rather than "latest" so the pipeline
      # doesn't break silently when a new Gitleaks release changes CLI flags or output format
      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # ── Step 3: Run Gitleaks ────────────────────────────────────────────────
      #
      # WHAT CHANGED HERE AND WHY (in plain language):
      #
      # 1. THE BUG: there used to be a line like this:
      #        --source . \  
      #    See those two trailing spaces after the backslash? In bash, a
      #    backslash only means "continue on the next line" if it is the
      #    VERY LAST character on the line. A space after it breaks that
      #    rule, so the command did not run the way it looked like it would.
      #    That was making the scan behave inconsistently — sometimes "noisy",
      #    sometimes silently wrong. This was a typo bug, not a real security
      #    setting, so removing it does not weaken the check at all.
      #
      # 2. THE DUPLICATE SCAN: the old version ran Gitleaks TWICE —
      #    once limited to just the latest commit's changes (--log-opts range),
      #    and once across the entire project folder (--no-git).
      #    The full-folder scan already includes everything the
      #    "latest commit only" scan would catch, PLUS everything else in the
      #    repo. So running both was pointless duplication — same coverage,
      #    twice the work, and two separate report files to juggle later.
      #    We keep only the full-folder scan (--no-git) so nothing is missed.
      #
      # Net result: same detection strength (actually slightly better, since
      # the full scan also catches old secrets sitting elsewhere in the repo,
      # not just ones in the latest commit), simpler code, one report file.
      #
      # continue-on-error: true — we don't want GitHub to skip later steps
      # before we get a chance to report the failure to the dashboard.
      # We handle the exit manually below.
      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks detect \
            --source . \
            --no-git \
            --redact \
            -v \
            --exit-code=1 \
            --report-format=json \
            --report-path=gitleaks-results.json || GITLEAKS_FAILED=true

          if [ "$GITLEAKS_FAILED" = "true" ]; then
            echo "Gitleaks found secrets!"
            echo "--- gitleaks results ---"
            cat gitleaks-results.json 2>/dev/null || echo "no results file"
            exit 1
          fi

      # ── Step 4: Run Semgrep ─────────────────────────────────────────────────
      # BUG FIX: returntocorp/semgrep-action@v1 is deprecated and often
      # silently passes without scanning. Replaced with direct CLI install
      # using specific rulesets that actually catch real issues.
      # We use 4 rulesets rather than "auto" — auto was too permissive and
      # returned 0 findings even on genuinely insecure code patterns.
      - name: Install and Run Semgrep
        id: semgrep
        continue-on-error: true
        run: |
          pip install semgrep --break-system-packages 2>/dev/null || pip install semgrep

          # Run with explicit security rulesets — 'auto' config was too
          # permissive and often returned 0 findings even on bad code.
          semgrep scan \
            --config "p/python" \
            --config "p/secrets" \
            --config "p/security-audit" \
            --config "p/owasp-top-ten" \
            --json \
            --output semgrep-results.json \
            --error \
            . || SEMGREP_FAILED=true

          if [ "$SEMGREP_FAILED" = "true" ]; then
            FINDING_COUNT=$(jq '.results | length' semgrep-results.json 2>/dev/null || echo "unknown")
            echo "Semgrep found $FINDING_COUNT issues"
            cat semgrep-results.json
            exit 1
          fi

      # ── Step 5: Notify code scan progress ──────────────────────────────────
      # "if: always()" ensures this runs even if Gitleaks or Semgrep failed —
      # we want the dashboard to show the BLOCK status immediately, not wait
      # for the rest of the pipeline to finish or time out
      - name: Notify Code Scan Progress
        if: always() && steps.pipeline_start.outputs.run_id != ''
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          RUN_ID: ${{ steps.pipeline_start.outputs.run_id }}
          GITLEAKS_RESULT: ${{ steps.gitleaks.outcome }}
          SEMGREP_RESULT: ${{ steps.semgrep.outcome }}
        run: |
          if [ "$GITLEAKS_RESULT" = "failure" ] || [ "$SEMGREP_RESULT" = "failure" ]; then
            STEP_RESULT="BLOCK"
            DETAIL="gitleaks=$GITLEAKS_RESULT semgrep=$SEMGREP_RESULT"
          else
            STEP_RESULT="PASS"
            DETAIL="no secrets or bad patterns found"
          fi

          PAYLOAD=$(jq -n \
            --arg result "$STEP_RESULT" \
            --arg detail "$DETAIL" \
            '{ pipeline_steps: { code_scan: { result: $result, detail: $detail } } }')

          curl -sS -X PATCH "$BACKEND_URL/api/scan-results/$RUN_ID/progress" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true

      # ── Step 6: Block on code scan failure ──────────────────────────────────
      #
      # WHAT CHANGED HERE AND WHY:
      # Since Step 3 now only ever writes ONE Gitleaks report file
      # (gitleaks-results.json), this step no longer needs to check two
      # different files (the old "gitleaks-full.json, then fall back to
      # gitleaks-results.json" logic). We simplified it to just read the one
      # file that actually exists now. This does not change what counts as a
      # failure — it only removes a leftover fallback that pointed at a file
      # which no longer gets created.
      #
      # We extract the specific finding (file, line, rule) from the JSON output
      # so the backend can pass it to the AI for a meaningful explanation,
      # rather than just saying "secret detected"
      - name: Block on Code Scan Failure
        if: steps.gitleaks.outcome == 'failure' || steps.semgrep.outcome == 'failure'
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          RUN_ID: ${{ steps.pipeline_start.outputs.run_id }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GITLEAKS_RESULT: ${{ steps.gitleaks.outcome }}
          SEMGREP_RESULT: ${{ steps.semgrep.outcome }}
        run: |
          if [ "$GITLEAKS_RESULT" = "failure" ]; then
            REASON="Secret or credential found in code (Gitleaks)"

            # Extract the actual finding from gitleaks JSON — file, line, rule
            GITLEAKS_DETAIL=$(jq -r '
              if length > 0 then
                .[0] | "Rule: \(.RuleID) | File: \(.File):\(.StartLine)"
              else
                "secret detected — check gitleaks output above"
              end
            ' gitleaks-results.json 2>/dev/null || echo "gitleaks=failure — see logs above")

            DETAIL="$GITLEAKS_DETAIL"
          else
            REASON="Insecure code pattern detected (Semgrep)"

            # Extract the actual finding from semgrep JSON — rule, file, line, message
            SEMGREP_DETAIL=$(jq -r '
              if (.results | length) > 0 then
                .results[0] |
                "Rule: \(.check_id | split(".") | last) | File: \(.path):\(.start.line) | \(.extra.message)"
              else
                "semgrep=failure — see logs above"
              end
            ' semgrep-results.json 2>/dev/null || echo "semgrep=failure — see logs above")

            DETAIL="$SEMGREP_DETAIL"
          fi

          # Safely encode run_id as JSON — if empty, send null so the backend
          # creates a new record rather than failing to find run_id in the DB
          RUN_ID_VAL="${RUN_ID:-null}"
          if [ "$RUN_ID_VAL" != "null" ] && [ -n "$RUN_ID_VAL" ]; then
            RUN_ID_JSON="\"$RUN_ID_VAL\""
          else
            RUN_ID_JSON="null"
          fi

          # Mark all downstream steps as "skipped" in pipeline_steps so the
          # dashboard shows exactly where the pipeline stopped
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg sha "$COMMIT_SHA" \
            --arg branch "$BRANCH_NAME" \
            --arg commit_msg "$COMMIT_MESSAGE" \
            --arg scan_type "full-pipeline" \
            --arg severity "HIGH" \
            --arg action "BLOCK" \
            --arg reason "$REASON" \
            --argjson run_id "$RUN_ID_JSON" \
            --arg code_detail "$DETAIL" \
            '{
              repo_name: $repo,
              commit_sha: $sha,
              branch: $branch,
              commit_message: $commit_msg,
              scan_type: $scan_type,
              severity: $severity,
              action: $action,
              reason: $reason,
              run_id: $run_id,
              findings: {},
              pipeline_steps: {
                checkout:  { result: "PASS",    detail: "code checked out" },
                code_scan: { result: "BLOCK",   detail: $code_detail },
                docker:    { result: "skipped", detail: "pipeline stopped at code scan" },
                trivy:     { result: "skipped", detail: "pipeline stopped at code scan" },
                policy:    { result: "skipped", detail: "pipeline stopped at code scan" },
                deploy:    { result: "skipped", detail: "pipeline stopped at code scan" }
              }
            }')

          curl -sS -X POST "$BACKEND_URL/api/scan-results" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true

          # exit 1 here is what actually fails the GitHub Actions job and
          # prevents the deployment steps from running
          exit 1

      # ── Step 7: Check if image needs rebuilding ─────────────────────────────
      # Optimization: skip the Docker build + Trivy scan entirely if no backend,
      # docker, or dependency files changed — frontend-only pushes don't need
      # a full image scan and this saves ~3-4 minutes per run.
      #
      # BUG FIX: The grep pattern '^backend/' only matched files starting
      # with backend/ — but git diff output may include paths like
      # 'backend/main.py' without a leading slash issue on some runners.
      # Made pattern more robust with (^|/) to handle both cases.
      - name: Check if image needs rebuilding
        id: changes
        if: steps.gitleaks.outcome != 'failure' && steps.semgrep.outcome != 'failure'
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            # First commit edge case — diff against empty tree
            CHANGED=$(git diff --name-only $(git hash-object -t tree /dev/null) HEAD)
          fi
          echo "Changed files: $CHANGED"

          if echo "$CHANGED" | grep -qE '(^|/)backend/|(^|/)docker/|policy\.yaml|requirements.*\.txt|Dockerfile'; then
            echo "image_changed=true" >> "$GITHUB_OUTPUT"
            echo "Backend/docker files changed — full image scan required"
          else
            echo "image_changed=false" >> "$GITHUB_OUTPUT"
            echo "No backend/docker files changed — skipping image scan"
          fi

      # ── Step 8: Report clean (no image changes) ─────────────────────────────
      # BUG FIX: Was missing the code scan outcome check.
      # This step was reporting ALLOW/CLEAN even when gitleaks/semgrep had
      # flagged issues, because the condition only checked image_changed.
      # Added explicit guards so this can never fire after a code scan failure.
      - name: Report Clean (no image changes)
        if: |
          steps.changes.outputs.image_changed == 'false' &&
          steps.gitleaks.outcome != 'failure' &&
          steps.semgrep.outcome != 'failure'
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          RUN_ID: ${{ steps.pipeline_start.outputs.run_id }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          RUN_ID_VAL="${RUN_ID:-null}"
          if [ "$RUN_ID_VAL" != "null" ] && [ -n "$RUN_ID_VAL" ]; then
            RUN_ID_JSON="\"$RUN_ID_VAL\""
          else
            RUN_ID_JSON="null"
          fi

          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg sha "$COMMIT_SHA" \
            --arg branch "$BRANCH_NAME" \
            --arg commit_msg "$COMMIT_MESSAGE" \
            --arg scan_type "full-pipeline" \
            --arg severity "CLEAN" \
            --arg action "ALLOW" \
            --arg reason "Code scan passed, no backend/docker files changed" \
            --argjson run_id "$RUN_ID_JSON" \
            '{
              repo_name: $repo,
              commit_sha: $sha,
              branch: $branch,
              commit_message: $commit_msg,
              scan_type: $scan_type,
              severity: $severity,
              action: $action,
              reason: $reason,
              run_id: $run_id,
              findings: {},
              pipeline_steps: {
                checkout:  { result: "PASS",    detail: "code checked out" },
                code_scan: { result: "PASS",    detail: "no secrets or bad patterns found" },
                docker:    { result: "skipped", detail: "no backend or docker files changed" },
                trivy:     { result: "skipped", detail: "no backend or docker files changed" },
                policy:    { result: "PASS",    detail: "no image changes — auto allow" },
                deploy:    { result: "skipped", detail: "no backend changes to deploy" }
              }
            }')

          curl -sS -X POST "$BACKEND_URL/api/scan-results" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true

      # ── Step 9: GCP auth ────────────────────────────────────────────────────
      # Only runs if backend/docker files actually changed — no point
      # authenticating to GCP for a frontend-only commit
      - name: Authenticate to Google Cloud
        if: steps.changes.outputs.image_changed == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: steps.changes.outputs.image_changed == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: steps.changes.outputs.image_changed == 'true'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # ── Step 10: Build and push image ───────────────────────────────────────
      # Tag with the commit SHA so every image is uniquely traceable back to
      # the exact code that built it — "latest" tags make rollbacks ambiguous
      - name: Build Backend Image
        if: steps.changes.outputs.image_changed == 'true'
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/backend:${{ github.sha }} \
            -f docker/Dockerfile .

      - name: Push Backend Image
        if: steps.changes.outputs.image_changed == 'true'
        run: |
          docker push us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/backend:${{ github.sha }}

      - name: Notify Build Progress
        if: steps.changes.outputs.image_changed == 'true' && steps.pipeline_start.outputs.run_id != ''
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          RUN_ID: ${{ steps.pipeline_start.outputs.run_id }}
        run: |
          curl -sS -X PATCH "$BACKEND_URL/api/scan-results/$RUN_ID/progress" \
            -H "Content-Type: application/json" \
            -d '{ "pipeline_steps": { "docker": { "result": "PASS", "detail": "image built and pushed" } } }' || true

      # ── Step 11: Trivy scan ─────────────────────────────────────────────────
      # Scan the actual pushed image — not the local build — so what we scan
      # is exactly what would get deployed to Cloud Run.
      # Scanning all severities (CRITICAL through LOW) so the dashboard shows
      # the full picture; the policy engine decides what actually blocks.
      - name: Run Trivy CVE Scan
        if: steps.changes.outputs.image_changed == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/backend:${{ github.sha }}
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH,MEDIUM,LOW

      - name: Upload Trivy Results
        if: steps.changes.outputs.image_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json

      # ── Step 12: Policy gate ────────────────────────────────────────────────
      # This is the core security gate — sends Trivy results to the backend,
      # which runs the policy engine and AI analysis, then returns ALLOW or BLOCK.
      # The pipeline deploys only if the backend explicitly returns ALLOW —
      # any error or unexpected response defaults to BLOCK (fail-safe).
      #
      # BUG FIX: run_id was interpolated as bare ${RUN_ID:-null} in jq
      # --argjson which breaks when RUN_ID is a string (jq expects raw JSON
      # for --argjson). Fixed with proper quoting logic before passing to jq.
      - name: Send to Dashboard and Check Policy Gate
        if: steps.changes.outputs.image_changed == 'true'
        id: gate
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          RUN_ID: ${{ steps.pipeline_start.outputs.run_id }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          VULN_COUNT=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy-results.json 2>/dev/null || echo "0")
          echo "Vulnerabilities found: $VULN_COUNT"

          RUN_ID_VAL="${RUN_ID:-null}"
          if [ "$RUN_ID_VAL" != "null" ] && [ -n "$RUN_ID_VAL" ]; then
            RUN_ID_JSON="\"$RUN_ID_VAL\""
          else
            RUN_ID_JSON="null"
          fi

          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg sha "$COMMIT_SHA" \
            --arg branch "$BRANCH_NAME" \
            --arg commit_msg "$COMMIT_MESSAGE" \
            --arg scan_type "full-pipeline" \
            --argjson vuln_count "$VULN_COUNT" \
            --argjson run_id "$RUN_ID_JSON" \
            --slurpfile findings trivy-results.json \
            '{
              repo_name: $repo,
              commit_sha: $sha,
              branch: $branch,
              commit_message: $commit_msg,
              scan_type: $scan_type,
              run_id: $run_id,
              findings: $findings[0],
              pipeline_steps: {
                checkout:  { result: "PASS",    detail: "code checked out" },
                code_scan: { result: "PASS",    detail: "no secrets or bad patterns found" },
                docker:    { result: "PASS",    detail: "image built and pushed" },
                trivy:     { result: "SCANNED", detail: "\($vuln_count) vulnerabilities found" }
              }
            }')

          RESPONSE=$(echo "$PAYLOAD" | curl -sS -f -X POST "$BACKEND_URL/api/scan-results" \
            -H "Content-Type: application/json" \
            -d @-)

          echo "Backend response: $RESPONSE"

          # Default to BLOCK if action is missing — fail-safe, not fail-open
          ACTION=$(echo "$RESPONSE" | jq -r '.action // "BLOCK"')
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

          if [ "$ACTION" = "BLOCK" ]; then
            echo "Policy gate says BLOCK — not deploying."
            exit 1
          fi

      # ── Step 13: Deploy (only if ALLOW) ─────────────────────────────────────
      # Double-gated: image must have changed AND policy must have returned ALLOW.
      # Deploying the same SHA that was scanned by Trivy — no bait-and-switch
      # between what was scanned and what gets deployed.
      - name: Deploy Backend to Cloud Run
        if: steps.changes.outputs.image_changed == 'true' && steps.gate.outputs.action == 'ALLOW'
        run: |
          gcloud run deploy secureflow-backend \
            --image us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/backend:${{ github.sha }} \
            --region us-central1 \
            --allow-unauthenticated

      - name: Build and Push Frontend
        if: steps.changes.outputs.image_changed == 'true' && steps.gate.outputs.action == 'ALLOW'
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/frontend:${{ github.sha }} \
            --build-arg REACT_APP_API_URL=https://secureflow-backend-1083585992526.us-central1.run.app \
            -f frontend/Dockerfile frontend/
          docker push us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/frontend:${{ github.sha }}

      - name: Deploy Frontend to Cloud Run
        if: steps.changes.outputs.image_changed == 'true' && steps.gate.outputs.action == 'ALLOW'
        run: |
          gcloud run deploy secureflow-frontend \
            --image us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/frontend:${{ github.sha }} \
            --region us-central1 \
            --allow-unauthenticated \
            --port 8080