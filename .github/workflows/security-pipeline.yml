name: SecureFlow Security Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

# ── FIX A: Concurrency control ────────────────────────────────────────────
# THE BUG: with no concurrency group, pushing several commits close together
# (as happened with the 9 stuck runs — several landing within the same
# hour) can cause GitHub Actions to queue or, on some runner configs,
# cancel an in-progress run on the same branch when a newer commit arrives.
# A cancelled run never reaches Step 5 ("Notify Code Scan Progress"), so the
# dashboard row created in Step 1 is left at status="running" forever.
#
# THE FIX: group by branch and let new pushes cancel the *stale* run instead
# of letting GitHub kill it ambiguously mid-job. This alone doesn't close
# the dashboard row, so it's paired with Fix C (the always()-gated final
# notifier) which explicitly reports "cancelled/superseded" back to the
# backend so the row never sits at "running" indefinitely.
concurrency:
  group: secureflow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-pipeline:
    name: Full Security Check
    runs-on: ubuntu-latest

    steps:

      # ── Step 0: Checkout ────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 fetches the full git history, not just the latest commit.
          # This is required for Gitleaks to scan all commits, not just HEAD —
          # without it, secrets committed earlier and then "deleted" would go undetected
          fetch-depth: 0

      # ── Step 1: Notify dashboard — pipeline started ─────────────────────────
      # Creates a "running" DB record immediately so the dashboard shows
      # the pipeline in progress before any scan results arrive.
      # The run_id returned here is passed to every subsequent step so they
      # all update the same record instead of creating duplicates.
      - name: Notify Pipeline Start
        id: pipeline_start
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg sha "$COMMIT_SHA" \
            --arg branch "$BRANCH_NAME" \
            --arg commit_msg "$COMMIT_MESSAGE" \
            --arg scan_type "full-pipeline" \
            '{ repo_name: $repo, commit_sha: $sha, branch: $branch, commit_message: $commit_msg, scan_type: $scan_type }')

          RESPONSE=$(curl -sS -f -X POST "$BACKEND_URL/api/scan-results/start" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo '{"run_id":null}')

          echo "Backend response: $RESPONSE"
          RUN_ID=$(echo "$RESPONSE" | jq -r '.run_id // empty')
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      # ── Step 2: Install Gitleaks ────────────────────────────────────────────
      # Pin to a specific version (v8.24.3) rather than "latest" so the pipeline
      # doesn't break silently when a new Gitleaks release changes CLI flags or output format
      #
      # ── FIX B: continue-on-error + retry on the install step ────────────────
      # THE BUG: this step had NO continue-on-error and NO retry logic. A
      # transient network blip or rate-limit (HTTP 429/5xx) on
      # github.com/gitleaks/gitleaks/releases/... — which is exactly the kind
      # of thing that happens when several CI runs hit GitHub's release CDN
      # within the same hour — failed the job immediately, before Step 5 ever
      # ran. The dashboard row from Step 1 was then never updated again.
      # This matches the stuck runs exactly: every one of them shows
      # "Checkout: pending" — meaning the job died before Step 5 could even
      # report checkout as PASS.
      #
      # THE FIX: retry the download up to 3 times with backoff, and mark the
      # step itself as continue-on-error so that even a final failure lets
      # the workflow reach Step 2a below, which reports the failure to the
      # dashboard instead of leaving the row stuck.
      - name: Install Gitleaks
        id: gitleaks_install
        continue-on-error: true
        run: |
          for attempt in 1 2 3; do
            if curl -sSL --fail --retry 2 --retry-delay 3 \
                 https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
                 -o gitleaks.tar.gz; then
              break
            fi
            echo "Gitleaks download attempt $attempt failed, retrying..."
            sleep $((attempt * 5))
            if [ "$attempt" = "3" ]; then
              echo "Gitleaks download failed after 3 attempts"
              exit 1
            fi
          done
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # ── Step 2a: Notify dashboard if Gitleaks itself failed to install ──────
      # NEW STEP. Without this, an install failure (now caught by
      # continue-on-error above) would otherwise just fall through into
      # Step 3 (Run Gitleaks), which would also fail since the binary
      # doesn't exist — but with no explicit reporting either way, the
      # dashboard row stays at "running" forever. This closes that gap
      # immediately rather than waiting for the watchdog timeout.
      - name: Notify Gitleaks Install Failure
        if: steps.gitleaks_install.outcome == 'failure' && steps.pipeline_start.outputs.run_id != ''
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          RUN_ID: ${{ steps.pipeline_start.outputs.run_id }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg sha "$COMMIT_SHA" \
            --arg branch "$BRANCH_NAME" \
            --arg commit_msg "$COMMIT_MESSAGE" \
            --arg scan_type "full-pipeline" \
            --arg severity "UNKNOWN" \
            --arg action "BLOCK" \
            --arg reason "Gitleaks failed to download/install (infra issue, not a security finding)" \
            --argjson run_id "\"${RUN_ID}\"" \
            '{
              repo_name: $repo, commit_sha: $sha, branch: $branch, commit_message: $commit_msg,
              scan_type: $scan_type, severity: $severity, action: $action, reason: $reason,
              run_id: $run_id, findings: {},
              pipeline_steps: {
                checkout:  { result: "PASS",   detail: "code checked out" },
                code_scan: { result: "FAILED", detail: "gitleaks install failed after 3 retries — infra/network issue" },
                docker:    { result: "skipped", detail: "pipeline stopped before code scan completed" },
                trivy:     { result: "skipped", detail: "pipeline stopped before code scan completed" },
                policy:    { result: "skipped", detail: "pipeline stopped before code scan completed" },
                deploy:    { result: "skipped", detail: "pipeline stopped before code scan completed" }
              }
            }')
          curl -sS -X POST "$BACKEND_URL/api/scan-results" \
            -H "Content-Type: application/json" -d "$PAYLOAD" || true
          exit 1

      # ── Step 3: Run Gitleaks ────────────────────────────────────────────────
      - name: Run Gitleaks
        id: gitleaks
        if: steps.gitleaks_install.outcome == 'success'
        continue-on-error: true
        run: |
          gitleaks detect \
            --source . \
            --redact \
            -v \
            --exit-code=1 \
            --report-format=json \
            --report-path=gitleaks-results.json || GITLEAKS_FAILED=true

          if [ "$GITLEAKS_FAILED" = "true" ]; then
            echo "Gitleaks found secrets!"
            echo "--- gitleaks results ---"
            cat gitleaks-results.json 2>/dev/null || echo "no results file"
            exit 1
          fi

      # ── Step 4: Run Semgrep ─────────────────────────────────────────────────
      - name: Install and Run Semgrep
        id: semgrep
        if: steps.gitleaks_install.outcome == 'success'
        continue-on-error: true
        run: |
          pip install semgrep --break-system-packages 2>/dev/null || pip install semgrep

          semgrep scan \
            --config "p/python" \
            --config "p/secrets" \
            --config "p/security-audit" \
            --config "p/owasp-top-ten" \
            --json \
            --output semgrep-results.json \
            --error \
            . || SEMGREP_FAILED=true

          if [ "$SEMGREP_FAILED" = "true" ]; then
            FINDING_COUNT=$(jq '.results | length' semgrep-results.json 2>/dev/null || echo "unknown")
            echo "Semgrep found $FINDING_COUNT issues"
            cat semgrep-results.json
            exit 1
          fi

      # ── Step 5: Notify code scan progress ──────────────────────────────────
      - name: Notify Code Scan Progress
        if: always() && steps.gitleaks_install.outcome == 'success' && steps.pipeline_start.outputs.run_id != ''
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          RUN_ID: ${{ steps.pipeline_start.outputs.run_id }}
          GITLEAKS_RESULT: ${{ steps.gitleaks.outcome }}
          SEMGREP_RESULT: ${{ steps.semgrep.outcome }}
        run: |
          if [ "$GITLEAKS_RESULT" = "failure" ] || [ "$SEMGREP_RESULT" = "failure" ]; then
            STEP_RESULT="BLOCK"
            DETAIL="gitleaks=$GITLEAKS_RESULT semgrep=$SEMGREP_RESULT"
          else
            STEP_RESULT="PASS"
            DETAIL="no secrets or bad patterns found"
          fi

          PAYLOAD=$(jq -n \
            --arg result "$STEP_RESULT" \
            --arg detail "$DETAIL" \
            '{ pipeline_steps: { code_scan: { result: $result, detail: $detail } } }')

          curl -sS -X PATCH "$BACKEND_URL/api/scan-results/$RUN_ID/progress" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true

      # ── Step 6: Block on code scan failure ──────────────────────────────────
      - name: Block on Code Scan Failure
        if: steps.gitleaks.outcome == 'failure' || steps.semgrep.outcome == 'failure'
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          RUN_ID: ${{ steps.pipeline_start.outputs.run_id }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GITLEAKS_RESULT: ${{ steps.gitleaks.outcome }}
          SEMGREP_RESULT: ${{ steps.semgrep.outcome }}
        run: |
          if [ "$GITLEAKS_RESULT" = "failure" ]; then
            REASON="Secret or credential found in code (Gitleaks)"
            GITLEAKS_DETAIL=$(jq -r '
              if length > 0 then
                .[0] | "Rule: \(.RuleID) | File: \(.File):\(.StartLine)"
              else
                "secret detected — check gitleaks output above"
              end
            ' gitleaks-results.json 2>/dev/null || echo "gitleaks=failure — see logs above")
            DETAIL="$GITLEAKS_DETAIL"
          else
            REASON="Insecure code pattern detected (Semgrep)"
            SEMGREP_DETAIL=$(jq -r '
              if (.results | length) > 0 then
                .results[0] |
                "Rule: \(.check_id | split(".") | last) | File: \(.path):\(.start.line) | \(.extra.message)"
              else
                "semgrep=failure — see logs above"
              end
            ' semgrep-results.json 2>/dev/null || echo "semgrep=failure — see logs above")
            DETAIL="$SEMGREP_DETAIL"
          fi

          RUN_ID_VAL="${RUN_ID:-null}"
          if [ "$RUN_ID_VAL" != "null" ] && [ -n "$RUN_ID_VAL" ]; then
            RUN_ID_JSON="\"$RUN_ID_VAL\""
          else
            RUN_ID_JSON="null"
          fi

          if [ "$GITLEAKS_RESULT" = "failure" ] && [ -f gitleaks-results.json ]; then
            GITLEAKS_JSON=$(jq -c 'if type == "array" then . elif . == null then [] else [.] end | map(select(type == "object"))' gitleaks-results.json 2>/dev/null || echo '[]')
          else
            GITLEAKS_JSON='[]'
          fi

          if [ "$SEMGREP_RESULT" = "failure" ] && [ -f semgrep-results.json ]; then
            SEMGREP_JSON=$(jq -c '.results // []' semgrep-results.json 2>/dev/null || echo '[]')
          else
            SEMGREP_JSON='[]'
          fi

          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg sha "$COMMIT_SHA" \
            --arg branch "$BRANCH_NAME" \
            --arg commit_msg "$COMMIT_MESSAGE" \
            --arg scan_type "full-pipeline" \
            --arg severity "HIGH" \
            --arg action "BLOCK" \
            --arg reason "$REASON" \
            --argjson run_id "$RUN_ID_JSON" \
            --arg code_detail "$DETAIL" \
            --argjson gitleaks "$GITLEAKS_JSON" \
            --argjson semgrep "$SEMGREP_JSON" \
            '{
              repo_name: $repo, commit_sha: $sha, branch: $branch, commit_message: $commit_msg,
              scan_type: $scan_type, severity: $severity, action: $action, reason: $reason,
              run_id: $run_id,
              gitleaks: $gitleaks,
              semgrep: $semgrep,
              findings: {},
              pipeline_steps: {
                checkout:  { result: "PASS",    detail: "code checked out" },
                code_scan: { result: "BLOCK",   detail: $code_detail },
                docker:    { result: "skipped", detail: "pipeline stopped at code scan" },
                trivy:     { result: "skipped", detail: "pipeline stopped at code scan" },
                policy:    { result: "skipped", detail: "pipeline stopped at code scan" },
                deploy:    { result: "skipped", detail: "pipeline stopped at code scan" }
              }
            }')

          RESPONSE=$(echo "$PAYLOAD" | curl -sS -X POST "$BACKEND_URL/api/scan-results" \
            -H "Content-Type: application/json" \
            -d @-)

          echo "Backend response: $RESPONSE"
          BACKEND_ACTION=$(echo "$RESPONSE" | jq -r '.action // "BLOCK"')
          if [ "$BACKEND_ACTION" != "BLOCK" ]; then
            echo "Warning: backend returned action=$BACKEND_ACTION but code scan failed — pipeline still blocked"
          fi

          exit 1

      # ── Step 7: Check if image needs rebuilding ─────────────────────────────
      - name: Check if image needs rebuilding
        id: changes
        if: steps.gitleaks.outcome != 'failure' && steps.semgrep.outcome != 'failure'
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git diff --name-only $(git hash-object -t tree /dev/null) HEAD)
          fi
          echo "Changed files: $CHANGED"

          if echo "$CHANGED" | grep -qE '(^|/)backend/|(^|/)docker/|policy\.yaml|requirements.*\.txt|Dockerfile'; then
            echo "image_changed=true" >> "$GITHUB_OUTPUT"
            echo "Backend/docker files changed — full image scan required"
          else
            echo "image_changed=false" >> "$GITHUB_OUTPUT"
            echo "No backend/docker files changed — skipping image scan"
          fi

          if echo "$CHANGED" | grep -qE '(^|/)frontend/'; then
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
            echo "Frontend files changed — frontend rebuild required"
          else
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
            echo "No frontend files changed — skipping frontend build"
          fi

      # ── Step 8: Report clean (no image changes) ─────────────────────────────
      - name: Report Clean (no image changes)
        if: |
          steps.changes.outputs.image_changed == 'false' &&
          steps.changes.outputs.frontend_changed == 'false' &&
          steps.gitleaks.outcome != 'failure' &&
          steps.semgrep.outcome != 'failure'
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          RUN_ID: ${{ steps.pipeline_start.outputs.run_id }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          RUN_ID_VAL="${RUN_ID:-null}"
          if [ "$RUN_ID_VAL" != "null" ] && [ -n "$RUN_ID_VAL" ]; then
            RUN_ID_JSON="\"$RUN_ID_VAL\""
          else
            RUN_ID_JSON="null"
          fi

          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg sha "$COMMIT_SHA" \
            --arg branch "$BRANCH_NAME" \
            --arg commit_msg "$COMMIT_MESSAGE" \
            --arg scan_type "full-pipeline" \
            --arg severity "CLEAN" \
            --arg action "ALLOW" \
            --arg reason "Code scan passed, no backend/docker files changed" \
            --argjson run_id "$RUN_ID_JSON" \
            '{
              repo_name: $repo, commit_sha: $sha, branch: $branch, commit_message: $commit_msg,
              scan_type: $scan_type, severity: $severity, action: $action, reason: $reason,
              run_id: $run_id, findings: {},
              pipeline_steps: {
                checkout:  { result: "PASS",    detail: "code checked out" },
                code_scan: { result: "PASS",    detail: "no secrets or bad patterns found" },
                docker:    { result: "skipped", detail: "no backend or docker files changed" },
                trivy:     { result: "skipped", detail: "no backend or docker files changed" },
                policy:    { result: "PASS",    detail: "no image changes — auto allow" },
                deploy:    { result: "skipped", detail: "no backend changes to deploy" }
              }
            }')

          curl -sS -X POST "$BACKEND_URL/api/scan-results" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true

      # ── Step 9: GCP auth ────────────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        if: steps.changes.outputs.image_changed == 'true' || steps.changes.outputs.frontend_changed == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: steps.changes.outputs.image_changed == 'true' || steps.changes.outputs.frontend_changed == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: steps.changes.outputs.image_changed == 'true' || steps.changes.outputs.frontend_changed == 'true'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # ── Step 10: Build and push backend image ───────────────────────────────
      - name: Build Backend Image
        id: docker_build
        if: steps.changes.outputs.image_changed == 'true'
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/backend:${{ github.sha }} \
            -f docker/Dockerfile .

      - name: Push Backend Image
        id: docker_push
        if: steps.changes.outputs.image_changed == 'true'
        run: |
          docker push us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/backend:${{ github.sha }}

      # ── Step 10a: Notify dashboard on Docker build/push failure ─────────────
      - name: Notify Docker Build/Push Failure
        if: >
          failure() &&
          steps.changes.outputs.image_changed == 'true' &&
          steps.pipeline_start.outputs.run_id != '' &&
          (steps.docker_build.outcome == 'failure' || steps.docker_push.outcome == 'failure')
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          RUN_ID: ${{ steps.pipeline_start.outputs.run_id }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          BUILD_OUTCOME: ${{ steps.docker_build.outcome }}
          PUSH_OUTCOME: ${{ steps.docker_push.outcome }}
        run: |
          if [ "$BUILD_OUTCOME" = "failure" ]; then
            FAIL_DETAIL="docker build failed — check Dockerfile and requirements.txt for errors"
          else
            FAIL_DETAIL="docker push failed — check GCP credentials and Artifact Registry permissions"
          fi

          RUN_ID_VAL="${RUN_ID:-null}"
          if [ "$RUN_ID_VAL" != "null" ] && [ -n "$RUN_ID_VAL" ]; then
            RUN_ID_JSON="\"$RUN_ID_VAL\""
          else
            RUN_ID_JSON="null"
          fi

          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg sha "$COMMIT_SHA" \
            --arg branch "$BRANCH_NAME" \
            --arg commit_msg "$COMMIT_MESSAGE" \
            --arg scan_type "full-pipeline" \
            --arg severity "HIGH" \
            --arg action "BLOCK" \
            --arg reason "Docker build/push failed" \
            --argjson run_id "$RUN_ID_JSON" \
            --arg fail_detail "$FAIL_DETAIL" \
            '{
              repo_name: $repo, commit_sha: $sha, branch: $branch, commit_message: $commit_msg,
              scan_type: $scan_type, severity: $severity, action: $action, reason: $reason,
              run_id: $run_id, findings: {},
              pipeline_steps: {
                checkout:  { result: "PASS",   detail: "code checked out" },
                code_scan: { result: "PASS",   detail: "no secrets or bad patterns found" },
                docker:    { result: "FAILED", detail: $fail_detail },
                trivy:     { result: "skipped", detail: "pipeline stopped at docker build/push" },
                policy:    { result: "skipped", detail: "pipeline stopped at docker build/push" },
                deploy:    { result: "skipped", detail: "pipeline stopped at docker build/push" }
              }
            }')

          curl -sS -X POST "$BACKEND_URL/api/scan-results" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true

      - name: Notify Build Progress
        if: >
          steps.changes.outputs.image_changed == 'true' &&
          steps.pipeline_start.outputs.run_id != '' &&
          steps.docker_build.outcome == 'success' &&
          steps.docker_push.outcome == 'success'
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          RUN_ID: ${{ steps.pipeline_start.outputs.run_id }}
        run: |
          curl -sS -X PATCH "$BACKEND_URL/api/scan-results/$RUN_ID/progress" \
            -H "Content-Type: application/json" \
            -d '{ "pipeline_steps": { "docker": { "result": "PASS", "detail": "image built and pushed" } } }' || true

      # ── Step 11: Trivy scan ─────────────────────────────────────────────────
      - name: Run Trivy CVE Scan
        if: >
          steps.changes.outputs.image_changed == 'true' &&
          steps.docker_build.outcome == 'success' &&
          steps.docker_push.outcome == 'success'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/backend:${{ github.sha }}
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH,MEDIUM,LOW

      - name: Upload Trivy Results
        if: >
          steps.changes.outputs.image_changed == 'true' &&
          steps.docker_build.outcome == 'success' &&
          steps.docker_push.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json

      # ── Step 12: Policy gate ────────────────────────────────────────────────
      - name: Send to Dashboard and Check Policy Gate
        if: >
          steps.changes.outputs.image_changed == 'true' &&
          steps.docker_build.outcome == 'success' &&
          steps.docker_push.outcome == 'success'
        id: gate
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          RUN_ID: ${{ steps.pipeline_start.outputs.run_id }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          VULN_COUNT=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy-results.json 2>/dev/null || echo "0")
          echo "Vulnerabilities found: $VULN_COUNT"

          RUN_ID_VAL="${RUN_ID:-null}"
          if [ "$RUN_ID_VAL" != "null" ] && [ -n "$RUN_ID_VAL" ]; then
            RUN_ID_JSON="\"$RUN_ID_VAL\""
          else
            RUN_ID_JSON="null"
          fi

          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg sha "$COMMIT_SHA" \
            --arg branch "$BRANCH_NAME" \
            --arg commit_msg "$COMMIT_MESSAGE" \
            --arg scan_type "full-pipeline" \
            --argjson vuln_count "$VULN_COUNT" \
            --argjson run_id "$RUN_ID_JSON" \
            --slurpfile findings trivy-results.json \
            '{
              repo_name: $repo, commit_sha: $sha, branch: $branch, commit_message: $commit_msg,
              scan_type: $scan_type, run_id: $run_id, findings: $findings[0],
              pipeline_steps: {
                checkout:  { result: "PASS",    detail: "code checked out" },
                code_scan: { result: "PASS",    detail: "no secrets or bad patterns found" },
                docker:    { result: "PASS",    detail: "image built and pushed" },
                trivy:     { result: "SCANNED", detail: "\($vuln_count) vulnerabilities found" }
              }
            }')

          RESPONSE=$(echo "$PAYLOAD" | curl -sS -f -X POST "$BACKEND_URL/api/scan-results" \
            -H "Content-Type: application/json" \
            -d @-)

          echo "Backend response: $RESPONSE"

          ACTION=$(echo "$RESPONSE" | jq -r '.action // "BLOCK"')
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

          if [ "$ACTION" = "BLOCK" ]; then
            echo "Policy gate says BLOCK — not deploying."
            exit 1
          fi

      # ── Step 13: Deploy backend ──────────────────────────────────────────────
      - name: Deploy Backend to Cloud Run
        if: steps.changes.outputs.image_changed == 'true' && steps.gate.outputs.action == 'ALLOW'
        run: |
          gcloud run deploy secureflow-backend \
            --image us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/backend:${{ github.sha }} \
            --region us-central1 \
            --allow-unauthenticated

      - name: Notify Deploy Success
        if: steps.changes.outputs.image_changed == 'true' && steps.gate.outputs.action == 'ALLOW'
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          RUN_ID: ${{ steps.pipeline_start.outputs.run_id }}
        run: |
          curl -sS -X PATCH "$BACKEND_URL/api/scan-results/$RUN_ID/progress" \
            -H "Content-Type: application/json" \
            -d '{ "pipeline_steps": { "policy": { "result": "PASS", "detail": "policy gate allowed deployment" }, "deploy": { "result": "PASS", "detail": "deployed to Cloud Run" } } }' || true

      - name: Notify Deploy Failure
        if: failure() && steps.changes.outputs.image_changed == 'true' && steps.gate.outputs.action == 'ALLOW'
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          RUN_ID: ${{ steps.pipeline_start.outputs.run_id }}
        run: |
          curl -sS -X PATCH "$BACKEND_URL/api/scan-results/$RUN_ID/progress" \
            -H "Content-Type: application/json" \
            -d '{ "pipeline_steps": { "policy": { "result": "PASS", "detail": "policy gate allowed deployment" }, "deploy": { "result": "FAILED", "detail": "gcloud run deploy command failed" } } }' || true

      # ── Step 14: Build and push frontend image ──────────────────────────────
      - name: Build and Push Frontend
        if: >
          steps.changes.outputs.frontend_changed == 'true' &&
          (steps.changes.outputs.image_changed == 'false' || steps.gate.outputs.action == 'ALLOW')
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/frontend:${{ github.sha }} \
            --build-arg REACT_APP_API_URL=https://secureflow-backend-1083585992526.us-central1.run.app \
            -f frontend/Dockerfile frontend/
          docker push us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/frontend:${{ github.sha }}

      # ── Step 15: Deploy frontend ─────────────────────────────────────────────
      - name: Deploy Frontend to Cloud Run
        if: >
          steps.changes.outputs.frontend_changed == 'true' &&
          (steps.changes.outputs.image_changed == 'false' || steps.gate.outputs.action == 'ALLOW')
        run: |
          gcloud run deploy secureflow-frontend \
            --image us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/frontend:${{ github.sha }} \
            --region us-central1 \
            --allow-unauthenticated \
            --port 8080

      # ── Step 16 (NEW): Job-level failsafe — catch anything still unreported ──
      # *** FIX C ***
      # THE BUG: every notify-failure step in this workflow is conditioned on
      # a SPECIFIC prior step's outcome (gitleaks, semgrep, docker_build,
      # docker_push, gate, deploy). That leaves gaps: a step failing for a
      # reason NONE of those conditions anticipate (checkout itself failing,
      # the runner getting OOM-killed, a YAML/permissions error, the
      # concurrency cancellation from Fix A, an unhandled exit in any step
      # without continue-on-error) falls through every single guard and the
      # job just ends — dashboard row stuck at "running" forever, exactly
      # like the 9 runs in the screenshot.
      #
      # THE FIX: one final step, gated only on `always()` and on the run_id
      # existing, that checks whether the job's overall conclusion was not
      # successful AND nothing has reported back yet. It can't know exactly
      # which step died, but it guarantees the dashboard row gets *closed*
      # instead of hanging — converting "stuck forever" into "reported as
      # failed, with a generic but honest reason." Combined with the
      # backend's stale-run watchdog, no run should ever again sit at
      # "running" past a couple of minutes without an explanation.
      - name: Failsafe — Notify Unhandled Pipeline Failure
        if: always() && failure() && steps.pipeline_start.outputs.run_id != ''
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          RUN_ID: ${{ steps.pipeline_start.outputs.run_id }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg sha "$COMMIT_SHA" \
            --arg branch "$BRANCH_NAME" \
            --arg commit_msg "$COMMIT_MESSAGE" \
            --arg scan_type "full-pipeline" \
            --arg severity "UNKNOWN" \
            --arg action "BLOCK" \
            --arg reason "Pipeline job failed or was cancelled at an unreported step — check GitHub Actions run logs for this commit" \
            --argjson run_id "\"${RUN_ID}\"" \
            '{
              repo_name: $repo, commit_sha: $sha, branch: $branch, commit_message: $commit_msg,
              scan_type: $scan_type, severity: $severity, action: $action, reason: $reason,
              run_id: $run_id, findings: {},
              pipeline_steps: {
                deploy: { result: "FAILED", detail: "job ended unexpectedly — see Actions logs" }
              }
            }')
          curl -sS -X POST "$BACKEND_URL/api/scan-results" \
            -H "Content-Type: application/json" -d "$PAYLOAD" || true