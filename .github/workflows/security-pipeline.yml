name: SecureFlow Security Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    name: Pre-Build Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

  build-and-scan:
    name: Build and CVE Scan
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t secureflow:${{ github.sha }} -f docker/Dockerfile .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secureflow:${{ github.sha }}
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH,MEDIUM,LOW

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json

      - name: Send Trivy results to backend
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg sha "$COMMIT_SHA" \
            --arg branch "$BRANCH_NAME" \
            --arg scan_type "trivy" \
            --arg severity "unknown" \
            --arg commit_msg "$COMMIT_MESSAGE" \
            --slurpfile findings trivy-results.json \
            '{repo_name: $repo, commit_sha: $sha, branch: $branch, scan_type: $scan_type, severity: $severity, commit_message: $commit_msg, findings: $findings[0]}')
          echo "$PAYLOAD" | curl -X POST "$BACKEND_URL/api/scan-results" \
            -H "Content-Type: application/json" \
            -d @-
        continue-on-error: true

  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Push Images
        run: |
          BUILD_ID=$(gcloud builds submit --config cloudbuild.yaml . --format='value(id)' --async)
          echo "Build ID: $BUILD_ID"
          while true; do
            STATUS=$(gcloud builds describe $BUILD_ID --format='value(status)')
            echo "Build status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "Build succeeded!"
              break
            elif [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "TIMEOUT" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            sleep 15
          done

      - name: Deploy Backend
        run: |
          gcloud run deploy secureflow-backend \
            --image us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/backend:latest \
            --region us-central1 \
            --allow-unauthenticated

      - name: Deploy Frontend
        run: |
          gcloud run deploy secureflow-frontend \
            --image us-central1-docker.pkg.dev/secureflow-499814/secureflow-repo/frontend:latest \
            --region us-central1 \
            --allow-unauthenticated \
            --port 8080