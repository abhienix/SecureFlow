name: SecureFlow Security Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    name: Pre-Build Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

  build-and-scan:
    name: Build and CVE Scan
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t secureflow:${{ github.sha }} -f docker/Dockerfile .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secureflow:${{ github.sha }}
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH,MEDIUM,LOW

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json

      - name: Send Trivy results to backend
        run: |
          curl -X POST ${{ secrets.BACKEND_URL }}/api/scan-results \
            -H "Content-Type: application/json" \
            -d "{\"repo_name\":\"${{ github.repository }}\",\"commit_sha\":\"${{ github.sha }}\",\"branch\":\"${{ github.ref_name }}\",\"scan_type\":\"trivy\",\"severity\":\"unknown\",\"findings\":$(cat trivy-results.json)}"
        continue-on-error: true