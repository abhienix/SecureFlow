name: Code Security Scan

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  code-scan:
    name: Secrets and Code Vulnerability Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      - name: Report Code Scan Result to Dashboard
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GITLEAKS_RESULT: ${{ steps.gitleaks.outcome }}
          SEMGREP_RESULT: ${{ steps.semgrep.outcome }}
        run: |
          echo "Gitleaks outcome: $GITLEAKS_RESULT"
          echo "Semgrep outcome: $SEMGREP_RESULT"

          if [ "$GITLEAKS_RESULT" = "failure" ] || [ "$SEMGREP_RESULT" = "failure" ]; then
            CODE_SEVERITY="HIGH"
            CODE_ACTION="BLOCK"
            CODE_REASON="Code scan failed: gitleaks=$GITLEAKS_RESULT semgrep=$SEMGREP_RESULT"
          else
            CODE_SEVERITY="CLEAN"
            CODE_ACTION="ALLOW"
            CODE_REASON="No secrets or code vulnerabilities found"
          fi

          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg sha "$COMMIT_SHA" \
            --arg branch "$BRANCH_NAME" \
            --arg scan_type "code-scan" \
            --arg commit_msg "$COMMIT_MESSAGE" \
            --arg severity "$CODE_SEVERITY" \
            --arg action "$CODE_ACTION" \
            --arg reason "$CODE_REASON" \
            '{repo_name: $repo, commit_sha: $sha, branch: $branch, scan_type: $scan_type, commit_message: $commit_msg, severity: $severity, action: $action, reason: $reason, findings: {}}')

          curl -sS -X POST "$BACKEND_URL/api/scan-results" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Fail if Code Scan Found Issues
        if: steps.gitleaks.outcome == 'failure' || steps.semgrep.outcome == 'failure'
        run: |
          echo "Code scan found issues - blocking pipeline."
          exit 1