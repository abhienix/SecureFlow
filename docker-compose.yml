services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: secureflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data: